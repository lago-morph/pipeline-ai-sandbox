name: contract-tests

on:
  pull_request:
    paths:
      - '.claude/skills/**/templates/agent/schemas/**'

permissions:
  contents: read

jobs:
  schema-validation:
    name: schema-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install jsonschema
          fi

      - name: Validate JSON Schemas (Draft 2020-12)
        run: |
          python - <<'PY'
          import sys
          import glob
          import json
          from jsonschema.validators import Draft202012Validator

          files = sorted(glob.glob(".claude/skills/*/templates/agent/schemas/**/*.schema.json",
                                   recursive=True))
          if not files:
              print("No schema files found; nothing to validate.")
              sys.exit(0)

          errors = []
          for f in files:
              try:
                  with open(f, "r", encoding="utf-8") as fh:
                      schema = json.load(fh)
              except Exception as e:
                  errors.append((f, f"JSON parse: {e!r}"))
                  print(f"FAIL: {f}: JSON parse: {e!r}", file=sys.stderr)
                  continue
              try:
                  Draft202012Validator.check_schema(schema)
                  print(f"ok: {f}")
              except Exception as e:
                  errors.append((f, f"schema invalid: {e!r}"))
                  print(f"FAIL: {f}: schema invalid: {e!r}", file=sys.stderr)

          if errors:
              print(f"{len(errors)} schema validation failure(s)", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate template command fixtures importable
        run: |
          python - <<'PY'
          import sys
          import glob
          import importlib.util
          import pathlib

          # Each skill's templates/agent/commands/ directory is a flat package of
          # fixture commands. Import each .py file by file path so we don't have
          # to munge sys.path with multiple sibling 'commands' packages.
          files = sorted(glob.glob(".claude/skills/*/templates/agent/commands/*.py"))
          if not files:
              print("No template command fixtures found; nothing to validate.")
              sys.exit(0)

          errors = []
          for f in files:
              path = pathlib.Path(f)
              # Use a unique module name keyed on the skill name + filename to
              # avoid collisions between identically-named files across skills.
              skill = path.parts[path.parts.index("skills") + 1]
              mod_name = f"_fixture_{skill}_{path.stem}"
              try:
                  spec = importlib.util.spec_from_file_location(mod_name, f)
                  if spec is None or spec.loader is None:
                      raise ImportError("could not build module spec")
                  module = importlib.util.module_from_spec(spec)
                  spec.loader.exec_module(module)
                  print(f"ok: {f}")
              except Exception as e:
                  errors.append((f, repr(e)))
                  print(f"FAIL: {f}: {e!r}", file=sys.stderr)

          if errors:
              print(f"{len(errors)} fixture import failure(s)", file=sys.stderr)
              sys.exit(1)
          PY
